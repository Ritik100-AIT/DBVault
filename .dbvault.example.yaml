database:
  type: mysql
  host: localhost
  port: 3306
  username: root
  password: ""
  name: ""

backup:
  type: full
  compression: gzip
  output_dir: ~/.dbvault/backups

storage:
  type: local

  local:
    path: ~/.dbvault/backups

  s3:
    bucket: my-db-backups
    region: ap-south-1
    access_key: ""
    secret_key: ""
    prefix: backups/

notifications:
  slack:
    enabled: false
    webhook_url: ""

logging:
  level: info
  format: json
  file: ~/.dbvault/logs/dbvault.log
  max_size_mb: 100
  max_backups: 7
